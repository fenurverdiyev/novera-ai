<html lang="az">
  <head>
    <meta charset="UTF-8" />

    <link rel="apple-touch-icon" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#03040a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="format-detection" content="telephone=no" />
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="NovEra">
    <title>NovEra - Yeni dövr başlayır</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              'bg-jet': 'var(--color-bg-jet)',
              'bg-slate': 'var(--color-bg-slate)',
              'bg-onyx': 'var(--color-bg-onyx)',
              'text-main': 'var(--color-text)',
              'text-sub': 'var(--color-subtext)',
              'accent': 'var(--color-accent)',
            }
          }
        }
      }
    </script>
    <style>
      :root {
        --color-bg-jet: #03040a;
        --color-bg-slate: #0a0b14;
        --color-bg-onyx: #121421;
        --color-text: #f8fafc;
        --color-subtext: #94a3b8;
        --color-accent: #38bdf8;
      }

      .theme-novera { --color-accent: #38bdf8; --color-bg-jet: #03040a; }
      .theme-terra { --color-accent: #2dd4bf; --color-bg-jet: #020617; }
      .theme-nebula { --color-accent: #818cf8; --color-bg-jet: #050505; }

      * {
        box-sizing: border-box;
      }

      body {
        background-color: var(--color-bg-jet);
        color: var(--color-text);
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        margin: 0;
        overflow-x: hidden;
      }
      
      html, body { height: 100%; width: 100%; }
      #root { 
        display: flex; 
        flex-direction: column; 
        justify-content: space-between; 
        min-height: 100vh;
        width: 100%; 
      }

      @media (max-width: 768px) {
        h1 { font-size: 24px; }
        .search-bar { width: 90%; margin: 0 auto; }
      }

      #loading-screen {
        position: fixed !important;
        inset: 0 !important;
        z-index: 9999 !important;
        background-color: #03040a !important;
        width: 100vw !important;
        height: 100vh !important;
        display: flex !important;
        flex-direction: column !important;
        align-items: center !important;
        justify-content: center !important;
        margin: 0 !important;
        padding: 0 !important;
      }
      
      #loading-screen.hidden {
        display: none !important;
      }

      #loading-screen > div {
        display: flex !important;
        flex-direction: column !important;
        align-items: center !important;
        justify-content: center !important;
        width: 100%;
        height: 100%;
      }
      
      #loading-screen div, #loading-screen p {
        position: relative;
        z-index: 1010;
        margin: 10px 0;
      }

      .glass-card {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .glass-input {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        transition: all 0.2s ease;
      }

      .glass-input:focus {
        background: rgba(255, 255, 255, 0.08);
        border-color: var(--color-accent);
        box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2);
      }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }

      .app-scroll { scrollbar-gutter: stable; }

      @keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      .animate-fade-in { animation: fade-in 0.4s ease-out forwards; }
    </style>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(reg => {
            console.log('SW registered');
          }).catch(err => {
            console.log('SW failed', err);
          });
        });
      }
    </script>
    <link rel="preconnect" href="https://rsms.me/">
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
    
    <!-- Export Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.1.1/",

  <body class="font-sans">
    <script>
      (function() {
        const setVh = () => {
          const vh = window.innerHeight * 0.01;
          document.documentElement.style.setProperty('--vh', vh + 'px');
        };
        setVh();
        window.addEventListener('resize', setVh);
        window.addEventListener('orientationchange', setVh);

        // Failsafe: hide loading screen after 4 seconds
        setTimeout(() => {
          const ls = document.getElementById('loading-screen');
          if (ls) {
            ls.style.display = 'none';
            try { ls.remove(); } catch(e) {}
          }
        }, 4000);
      })();
    </script>
    <div id="loading-screen" style="position: fixed !important; top: 0 !important; left: 0 !important; width: 100vw !important; height: 100vh !important; background: #03040a !important; z-index: 99999 !important; display: flex !important; flex-direction: column !important; align-items: center !important; justify-content: center !important; margin: 0 !important; padding: 0 !important; font-family: sans-serif !important;">
      <div style="display: flex !important; flex-direction: column !important; align-items: center !important; justify-content: center !important; gap: 24px !important; text-align: center !important; width: 100% !important;">
        <h1 style="color: white !important; font-size: clamp(40px, 10vw, 64px) !important; font-weight: 900 !important; letter-spacing: -2px !important; margin: 0 !important;">NovEra</h1>
        <p style="color: #38bdf8 !important; font-size: 14px !important; font-weight: 600 !important; letter-spacing: 4px !important; text-transform: uppercase !important; margin: 0 !important;">Yüklənir...</p>
      </div>
    </div>
    <div id="root" class="bg-transparent"></div>
    <canvas id="theme-animation-canvas"></canvas>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
