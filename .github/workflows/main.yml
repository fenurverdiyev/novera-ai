name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'

    - name: Install Dependencies
      run: npm ci

    - name: Build Frontend
      run: npm run build
      env:
        CI: false # Ignore warnings as errors

    # - name: Deploy to Production
    #   run: echo "Add your deployment scripts here (e.g., Vercel, Render, VPS ssh commands)"
